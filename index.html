<!DOCTYPE html>
<html>
<head>
  <title>HyukiaTier</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .tier {
      display: flex;
      margin: 10px 0;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }

    .label {
      width: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .items {
      display: flex;
      gap: 10px;
      padding: 10px;
      flex-wrap: wrap;
      flex: 1;
    }

    .item {
      background: #222;
      padding: 10px;
      border-radius: 6px;
      min-width: 100px;
      text-align: center;
    }

    /* Tier colors */
    .s .label { background: gold; color: black; }
    .a .label { background: orange; color: black; }
    .b .label { background: yellow; color: black; }
    .c .label { background: green; }
    .d .label { background: gray; }
  </style>
</head>

<body>
  <h1>HyukiaTier</h1>

  <div class="tier s">
    <div class="label">S Tier</div>
    <div class="items">
      <div class="item">Ender Dragon</div>
      <div class="item">Warden</div>
    </div>
  </div>

  <div class="tier a">
    <div class="label">A Tier</div>
    <div class="items">
      <div class="item">Iron Golem</div>
      <div class="item">Wither</div>
    </div>
  </div>

  <div class="tier b">
    <div class="label">B Tier</div>
    <div class="items">
      <div class="item">Zombie</div>
      <div class="item">Skeleton</div>
    </div>
  </div>

  <div class="tier c">
    <div class="label">C Tier</div>
    <div class="items">
      <div class="item">Pig</div>
      <div class="item">Cow</div>
    </div>
  </div>

  <div class="tier d">
    <div class="label">D Tier</div>
    <div class="items">
      <div class="item">Chicken</div>
    </div>
  </div>

</body>
</html>
